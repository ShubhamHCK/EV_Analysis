<!DOCTYPE html>
<html>
<head>
    <title>EV Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/about">About</a>
    <a href="/story">Story</a>
</div>

<!-- Main Container -->
<div class="container">

<h1>⚡ EV Analytics Platform</h1>
<p>Explore Electric Vehicle insights through interactive dashboards</p>

<!-- Loader -->
<div class="loader"></div>

<!-- EV Overview -->
<div class="card">
<h2>📊 EV Overview</h2>

<iframe 
src="https://public.tableau.com/views/Ishita_EV_Analysis/Dashboard1?:embed=y&:display_count=yes"
width="100%" 
height="600"
style="border:none;">
</iframe>

</div>

<!-- Battery Performance -->
<div class="card">
<h2>🔋 Battery Performance</h2>

<iframe 
src="https://public.tableau.com/views/BatteryPerformanceAnalysisDashboard/Dashboard2?:embed=y&:display_count=yes"
width="100%" 
height="600"
style="border:none;">
</iframe>

</div>

<!-- Charging Efficiency -->
<div class="card">
<h2>⚡ Charging Efficiency</h2>

<iframe 
src="https://public.tableau.com/views/EVChargingEfficiencyAnalysisDashboard/Dashboard2?:embed=y&:display_count=yes"
width="100%" 
height="600"
style="border:none;">
</iframe>

</div>

<!-- EV Model Comparison -->
<div class="card">
<h2>🚗 EV Model Comparison</h2>

<iframe 
src="https://public.tableau.com/views/EVModelComparisonDashboard/Dashboard3?:embed=y&:display_count=yes"
width="100%" 
height="600"
style="border:none;">
</iframe>

</div>

</div>

<!-- Loader Hide Script -->
<script>
window.addEventListener("load", function(){
    const loader = document.querySelector(".loader");
    if(loader) loader.style.display = "none";
});
</script>

</body>
</html>
